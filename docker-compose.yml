version: "3"

services:

  user-service:
    build: ./user-service
    container_name: user-service

  product-service:
    build: ./product-service
    container_name: product-service

  gateway:
    build: ./gateway
    container_name: gateway
    ports:
      - "3000:3000"
    depends_on:
      - user-service
      - product-service